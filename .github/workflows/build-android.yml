name: Build Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (必填，例如: v1.0.0)'
        required: true
        default: 'v1.0.0'
      create_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="v0.0.0-dev${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          echo "name=${version#v}" >> "$GITHUB_OUTPUT"
          echo "code=$((1 + GITHUB_RUN_NUMBER))" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode release signing key
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "have_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No signing keystore secret set — building debug-signed APK only."
          fi

      - name: Build Release APK
        if: steps.keystore.outputs.have_keystore == 'true'
        shell: bash
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle --no-daemon assembleRelease \
            -Pandroid.injected.signing.store.file="$ANDROID_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD" \
            || gradle --no-daemon assembleRelease

      - name: Build Debug APK (no keystore)
        if: steps.keystore.outputs.have_keystore != 'true'
        shell: bash
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: |
          gradle --no-daemon assembleDebug

      - name: Collect APKs
        shell: bash
        run: |
          mkdir -p dist
          find app/build/outputs/apk -type f -name '*.apk' -print -exec cp {} dist/ \;
          # Rename to a friendly name with version
          for f in dist/*.apk; do
            base=$(basename "$f" .apk)
            mv "$f" "dist/live-subtitle-${{ steps.version.outputs.name }}-${base}.apk"
          done
          ls -lah dist

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: live-subtitle-android-${{ steps.version.outputs.tag }}
          path: dist/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_release && steps.keystore.outputs.have_keystore == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Live Subtitle Android ${{ steps.version.outputs.tag }}
          files: dist/*.apk
          generate_release_notes: true
